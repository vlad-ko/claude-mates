# Claude Mates — Self-dogfooding configuration
# This project uses its own framework to maintain itself.

labels:
  prefix: claude-mate

exclude:
  - .git/
  - node_modules/

mates:
  docs:
    enabled: true
    model: haiku
    max_turns: 10  # Small repo — 10 turns is plenty
    schedule: post-merge

  security:
    enabled: true
    # Security mate is a thin wrapper over anthropics/claude-code-security-review.
    # It runs on pull_request (not nightly) — see .github/workflows/security.yml.
    # `model` / `max_turns` above do not apply; the scanner picks its own model
    # (Opus 4.1 by default).
    exclude_directories:
      - .github/workflows/
      - examples/
      - docs/archive/

  dead-code:
    enabled: true
    model: haiku
    max_turns: 10
    schedule: nightly

  tests:
    enabled: true
    model: haiku
    max_turns: 10
    schedule: nightly

  logic:
    enabled: true
    model: haiku
    max_turns: 10
    schedule: nightly

deny:
  - NEVER merge any PR — always require human approval
  - NEVER create a PR without creating a GitHub issue first
  - NEVER push directly to main — always use a feature branch and PR
  - NEVER modify .env files or secrets
  - NEVER modify .github/workflows/ — CODEOWNERS protects these
  - NEVER modify runner.sh, dispatcher.sh, or action.yml — framework core
  - NEVER modify another mate's PROMPT.md or mate.yml
  - NEVER modify CODEOWNERS or SECURITY.md
