# Claude Mate: Security
# Runs nightly. For adopters: consider replacing with a PR-scoped specialized
# security review like anthropics/claude-code-security-review — pre-merge is
# a better fit for security than post-merge.
#
# Kept here for dogfooding the generic mate framework. Nightly batching
# means credits scale with calendar time, not commit volume.

name: "Mate: Security"

on:
  schedule:
    - cron: '0 6 * * 1-5'  # Weekdays 6am UTC
  workflow_dispatch: {}

concurrency:
  group: mate-security
  cancel-in-progress: false


permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  security:
    uses: ./.github/workflows/_run-mate.yml
    with:
      mate: "security"
      mates_root: "."
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_MATES_API_KEY }}
