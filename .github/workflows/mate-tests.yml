# Claude Mate: Tests
# Runs on merge to main and nightly schedule

name: "Mate: Tests"

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1-5'  # Weekdays 6am UTC
  workflow_dispatch: {}

concurrency:
  group: mate-tests
  cancel-in-progress: false


permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  tests:
    uses: ./.github/workflows/_run-mate.yml
    with:
      mate: "tests"
      mates_root: "."
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_MATES_API_KEY }}
