# Automated release — tags and publishes on merge to main
# Determines version bump from conventional commit prefixes:
#   feat: → minor (0.x.0)
#   fix:/chore:/docs: → patch (0.0.x)
#
# Skip by including [skip release] in the merge commit message.

name: Release

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip if:
    #   - Commit message contains [skip release] (the intentional opt-out)
    #   - Commit is from a claude-mate (prevents mate-triggered releases)
    #   - Commit starts with "docs: Update CHANGELOG for v" (defense-in-depth
    #     against the auto-CHANGELOG PR re-triggering the workflow, in case
    #     someone edits the merge commit message and drops [skip release],
    #     or the repo uses merge commits that don't inherit the PR title)
    if: "!contains(github.event.head_commit.message, '[skip release]') && !contains(github.event.head_commit.message, '[claude-mate') && !startsWith(github.event.head_commit.message, 'docs: Update CHANGELOG for v')"
    # contents: write — for pushing tags and creating the GitHub Release
    # pull-requests: write — for opening the automated CHANGELOG PR after each release.
    # Both are required; the CHANGELOG PR step at the end of this job fails with
    # "Resource not accessible by integration" if pull-requests is missing.
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history for tag detection

      - name: Get latest tag
        id: latest
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "v0.0.0")
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $LATEST"

      - name: Determine version bump
        id: bump
        run: |
          LATEST="${{ steps.latest.outputs.tag }}"
          # Get commits since last tag and save to file for downstream steps
          if git rev-parse "$LATEST" >/dev/null 2>&1; then
            git log "${LATEST}..HEAD" --oneline --no-merges > /tmp/release-commits.txt
          else
            git log --oneline --no-merges -10 > /tmp/release-commits.txt
          fi
          COMMITS=$(cat /tmp/release-commits.txt)

          echo "Commits since $LATEST:"
          echo "$COMMITS"

          # Skip if no non-merge commits
          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No new commits — skipping release"
            exit 0
          fi

          # Determine bump type from conventional commits.
          # Pattern accepts optional scope (paren group) and optional ! breaking
          # marker. Without the !? here, `feat!:` (a breaking feature) silently
          # falls through to the patch regex — producing a wrong patch bump
          # instead of a minor. Porting webo's correct regex.
          if echo "$COMMITS" | grep -qiE "^[a-f0-9]+ feat(\([a-z0-9-]+\))?!?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qiE "^[a-f0-9]+ (fix|chore|docs|refactor|style|perf|test)(\([a-z0-9-]+\))?!?:"; then
            BUMP="patch"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No conventional commits found — skipping release"
            exit 0
          fi

          # Calculate new version
          MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)

          case "$BUMP" in
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          {
            echo "bump=$BUMP"
            echo "new_tag=$NEW_TAG"
            echo "skip=false"
          } >> "$GITHUB_OUTPUT"
          echo "Version bump: $BUMP ($LATEST → $NEW_TAG)"

      - name: Build grouped release notes
        if: steps.bump.outputs.skip != 'true'
        run: |
          NEW_TAG="${{ steps.bump.outputs.new_tag }}"
          LATEST="${{ steps.latest.outputs.tag }}"

          # Group commits by conventional prefix into GitHub Release body
          # Pattern accepts optional scope and optional ! breaking marker,
          # matching the bump-detection pattern above.
          FEATS=$(grep -iE "^[a-f0-9]+ feat(\([a-z0-9-]+\))?!?:" /tmp/release-commits.txt 2>/dev/null | sed 's/^[a-f0-9]* //' || true)
          FIXES=$(grep -iE "^[a-f0-9]+ fix(\([a-z0-9-]+\))?!?:" /tmp/release-commits.txt 2>/dev/null | sed 's/^[a-f0-9]* //' || true)
          OTHER=$(grep -iE "^[a-f0-9]+ (chore|docs|refactor|style|perf|test)(\([a-z0-9-]+\))?!?:" /tmp/release-commits.txt 2>/dev/null | sed 's/^[a-f0-9]* //' || true)

          {
            if [ -n "$FEATS" ]; then
              echo "### Added"
              while IFS= read -r line; do [ -n "$line" ] && echo "- $line"; done <<< "$FEATS"
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### Fixed"
              while IFS= read -r line; do [ -n "$line" ] && echo "- $line"; done <<< "$FIXES"
              echo ""
            fi
            if [ -n "$OTHER" ]; then
              echo "### Changed"
              while IFS= read -r line; do [ -n "$line" ] && echo "- $line"; done <<< "$OTHER"
              echo ""
            fi
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LATEST}...${NEW_TAG}"
          } > /tmp/release-notes.md

          echo "─── Release notes for $NEW_TAG ───"
          cat /tmp/release-notes.md

      - name: Create tag and release
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_TAG="${{ steps.bump.outputs.new_tag }}"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --notes-file /tmp/release-notes.md
          echo "Released $NEW_TAG"

      - name: Open CHANGELOG update PR
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_TAG="${{ steps.bump.outputs.new_tag }}"
          TODAY=$(date -u +%Y-%m-%d)
          BRANCH="chore/changelog-${NEW_TAG}"

          # If the branch already exists (retry scenario), skip gracefully
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH already exists — skipping CHANGELOG PR creation"
            exit 0
          fi

          # Build CHANGELOG entry from grouped release notes + version header
          {
            echo "## [${NEW_TAG#v}] - ${TODAY}"
            echo ""
            cat /tmp/release-notes.md
          } > /tmp/changelog-entry.md

          # Insert entry before the first existing "## [" heading
          if grep -q "^## \[" CHANGELOG.md; then
            awk -v entry_file=/tmp/changelog-entry.md '
              /^## \[/ && !inserted {
                while ((getline line < entry_file) > 0) print line
                print ""
                inserted=1
              }
              { print }
            ' CHANGELOG.md > CHANGELOG.md.new
          else
            # No existing entries — append after header
            cp CHANGELOG.md CHANGELOG.md.new
            echo "" >> CHANGELOG.md.new
            cat /tmp/changelog-entry.md >> CHANGELOG.md.new
          fi
          mv CHANGELOG.md.new CHANGELOG.md

          # Commit to a new branch (not main) and open PR for developer review
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add CHANGELOG.md
          git commit -m "docs: Update CHANGELOG for ${NEW_TAG} [skip release]"
          git push origin "$BRANCH"

          # [skip release] MUST be in the PR title — squash-merge commits
          # use the PR title as the commit message, and even merge-commit
          # strategies often inherit it. Without this marker, merging this
          # PR would re-trigger the release workflow (because the merge
          # commit message starts with "docs:" which is a valid bump
          # prefix) and create an infinite release loop.
          gh pr create \
            --title "docs: Update CHANGELOG for ${NEW_TAG} [skip release]" \
            --body "Automated CHANGELOG update for release ${NEW_TAG}. Review and merge.\n\nRelease: https://github.com/${{ github.repository }}/releases/tag/${NEW_TAG}" \
            --base main \
            --head "$BRANCH" \
            --label "chore"

          echo "Opened CHANGELOG PR for review"
