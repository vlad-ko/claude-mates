# Automated release — tags and publishes on merge to main
# Determines version bump from conventional commit prefixes:
#   feat: → minor (0.x.0)
#   fix:/chore:/docs: → patch (0.0.x)
#
# Skip by including [skip release] in the merge commit message.

name: Release

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip mate commits, merge commits with [skip release], and badge/doc-only fixes
    if: >-
      !contains(github.event.head_commit.message, '[skip release]') &&
      !contains(github.event.head_commit.message, '[claude-mate')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history for tag detection

      - name: Get latest tag
        id: latest
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "v0.0.0")
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $LATEST"

      - name: Determine version bump
        id: bump
        run: |
          LATEST="${{ steps.latest.outputs.tag }}"
          # Get commits since last tag and save to file for downstream steps
          if git rev-parse "$LATEST" >/dev/null 2>&1; then
            git log "${LATEST}..HEAD" --oneline --no-merges > /tmp/release-commits.txt
          else
            git log --oneline --no-merges -10 > /tmp/release-commits.txt
          fi
          COMMITS=$(cat /tmp/release-commits.txt)

          echo "Commits since $LATEST:"
          echo "$COMMITS"

          # Skip if no non-merge commits
          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No new commits — skipping release"
            exit 0
          fi

          # Determine bump type from conventional commits
          if echo "$COMMITS" | grep -qiE "^[a-f0-9]+ feat(\(|:)"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qiE "^[a-f0-9]+ (fix|chore|docs|refactor|style|perf|test)(\(|:)"; then
            BUMP="patch"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No conventional commits found — skipping release"
            exit 0
          fi

          # Calculate new version
          MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)

          case "$BUMP" in
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Version bump: $BUMP ($LATEST → $NEW_TAG)"

      - name: Generate release notes
        id: notes
        if: steps.bump.outputs.skip != 'true'
        run: |
          LATEST="${{ steps.latest.outputs.tag }}"
          NEW_TAG="${{ steps.bump.outputs.new_tag }}"

          # Build release notes from commits
          NOTES="## What's Changed\n\n"
          if git rev-parse "$LATEST" >/dev/null 2>&1; then
            NOTES+=$(git log "${LATEST}..HEAD" --oneline --no-merges | sed 's/^[a-f0-9]* /- /')
          else
            NOTES+=$(git log --oneline --no-merges -10 | sed 's/^[a-f0-9]* /- /')
          fi
          NOTES+="\n\n**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LATEST}...${NEW_TAG}"

          # Write to file to avoid quoting issues
          printf "%b" "$NOTES" > /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: Update CHANGELOG.md
        if: steps.bump.outputs.skip != 'true'
        run: |
          NEW_TAG="${{ steps.bump.outputs.new_tag }}"
          TODAY=$(date -u +%Y-%m-%d)

          # Build CHANGELOG entry from commits grouped by type
          ENTRY="## [${NEW_TAG#v}] - ${TODAY}\n\n"

          # Group commits by conventional prefix
          FEATS=$(grep -iE "^[a-f0-9]+ feat(\(|:)" /tmp/release-commits.txt 2>/dev/null | sed 's/^[a-f0-9]* //' || true)
          FIXES=$(grep -iE "^[a-f0-9]+ fix(\(|:)" /tmp/release-commits.txt 2>/dev/null | sed 's/^[a-f0-9]* //' || true)
          OTHER=$(grep -iE "^[a-f0-9]+ (chore|docs|refactor|style|perf|test)(\(|:)" /tmp/release-commits.txt 2>/dev/null | sed 's/^[a-f0-9]* //' || true)

          if [ -n "$FEATS" ]; then
            ENTRY+="### Added\n"
            while IFS= read -r line; do [ -n "$line" ] && ENTRY+="- $line\n"; done <<< "$FEATS"
            ENTRY+="\n"
          fi
          if [ -n "$FIXES" ]; then
            ENTRY+="### Fixed\n"
            while IFS= read -r line; do [ -n "$line" ] && ENTRY+="- $line\n"; done <<< "$FIXES"
            ENTRY+="\n"
          fi
          if [ -n "$OTHER" ]; then
            ENTRY+="### Changed\n"
            while IFS= read -r line; do [ -n "$line" ] && ENTRY+="- $line\n"; done <<< "$OTHER"
            ENTRY+="\n"
          fi

          # Insert after the header (first "## [" line or after first 3 lines if no existing entries)
          if grep -q "^## \[" CHANGELOG.md; then
            # Insert before the first existing entry
            awk -v entry="$(printf "%b" "$ENTRY")" '
              /^## \[/ && !inserted { print entry; inserted=1 }
              { print }
            ' CHANGELOG.md > CHANGELOG.md.new
          else
            # No existing entries — append after header
            cp CHANGELOG.md CHANGELOG.md.new
            printf "\n%b" "$ENTRY" >> CHANGELOG.md.new
          fi
          mv CHANGELOG.md.new CHANGELOG.md

          # Commit the CHANGELOG update back to main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: Update CHANGELOG for ${NEW_TAG} [skip release]"
          git push origin main

      - name: Create tag and release
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_TAG="${{ steps.bump.outputs.new_tag }}"
          # Tag the CHANGELOG commit so the tag includes the CHANGELOG update
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --notes-file /tmp/release-notes.md
          echo "Released $NEW_TAG"
