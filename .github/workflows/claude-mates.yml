# Claude Mates — Self-dogfooding
# This repo uses its own framework to maintain itself.
# Since this IS the framework, dispatcher/runner are local (no external checkout).

name: Claude Mates (Self)

on:
  # Run after merge to main
  push:
    branches: [main]

  # Nightly sweep (weekdays 6am UTC)
  schedule:
    - cron: '0 6 * * 1-5'

  # Manual dispatch for testing
  workflow_dispatch:
    inputs:
      mate:
        description: 'Which mate to run'
        required: false
        default: 'docs'
        type: choice
        options:
          - docs
          - security
          - dead-code
          - tests
          - logic
          - all

# Prevent concurrent runs
concurrency:
  group: claude-mates-self
  cancel-in-progress: false

jobs:
  run-mates:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Loop guard: skip if the commit is from a claude-mate (prevent infinite loops)
    if: >-
      !contains(github.event.head_commit.message, '[claude-mate') &&
      !contains(github.event.head_commit.message, 'claude-mate/')

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine which mate to run
        id: which-mate
        env:
          MATE_INPUT: ${{ inputs.mate }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mate=${MATE_INPUT}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "mate=all" >> $GITHUB_OUTPUT
          else
            # Post-merge: run post-merge mates (docs, security)
            echo "mate=docs" >> $GITHUB_OUTPUT
          fi

      - name: Build trigger context
        id: context
        env:
          MATE_INPUT: ${{ inputs.mate }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            CONTEXT="{\"event\":\"push\",\"sha\":\"${{ github.sha }}\",\"ref\":\"${{ github.ref }}\"}"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            CONTEXT="{\"event\":\"schedule\",\"cron\":\"nightly\"}"
          else
            CONTEXT="{\"event\":\"manual\",\"mate\":\"${MATE_INPUT}\"}"
          fi
          echo "context=$CONTEXT" >> $GITHUB_OUTPUT

      # Pin CLI version for supply chain security
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.97

      # Since this repo IS the framework, MATES_ROOT points to the repo root
      - name: Run Claude Mates
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_MATES_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MATE_NAME: ${{ steps.which-mate.outputs.mate }}
          CONFIG_PATH: .claude-mates.yml
          TRIGGER_CONTEXT: ${{ steps.context.outputs.context }}
          MATES_ROOT: .
        run: bash ./dispatcher.sh

      - name: Upload run summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-mates-run-${{ github.run_number }}
          path: /tmp/mate-*-summary.json
          retention-days: 30
          if-no-files-found: ignore
