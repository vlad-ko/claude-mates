# CI validation for PRs to the claude-mates framework
name: PR Checks

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint runner.sh
        run: shellcheck -x runner.sh

  runner-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run Phase 0 integration tests
        run: bash tests/runner_phase0_test.sh

  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint -d relaxed .claude-mates.yml
          yamllint -d relaxed mates/*/mate.yml
          yamllint -d relaxed .github/workflows/*.yml
          yamllint -d relaxed action.yml
