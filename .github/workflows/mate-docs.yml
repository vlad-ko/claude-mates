# Claude Mate: Docs
# Runs nightly on weekdays. Doc drift is a staleness problem, not a
# per-commit problem — batching once per day catches accumulated drift
# with far fewer API calls than per-merge runs, and eliminates the
# "CHANGELOG-PR merge spuriously triggers docs mate" waste pattern.

name: "Mate: Docs"

on:
  schedule:
    - cron: '0 6 * * 1-5'  # Weekdays 6am UTC
  workflow_dispatch: {}

concurrency:
  group: mate-docs
  cancel-in-progress: false


permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  docs:
    uses: ./.github/workflows/_run-mate.yml
    with:
      mate: "docs"
      mates_root: "."
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_MATES_API_KEY }}
