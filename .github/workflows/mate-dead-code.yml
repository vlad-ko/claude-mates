# Claude Mate: Dead Code
# Runs nightly. Dead-code detection is a drift problem — accumulates over
# days/weeks — so a per-merge trigger just burns API credits without adding
# signal beyond what the next nightly run would catch.

name: "Mate: Dead Code"

on:
  schedule:
    - cron: '0 6 * * 1-5'  # Weekdays 6am UTC
  workflow_dispatch: {}

concurrency:
  group: mate-dead-code
  cancel-in-progress: false


permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  dead-code:
    uses: ./.github/workflows/_run-mate.yml
    with:
      mate: "dead-code"
      mates_root: "."
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_MATES_API_KEY }}
