# Reusable workflow — called by individual mate workflows
# Do NOT trigger this directly. Use mate-docs.yml, mate-security.yml, etc.

name: Run Mate

on:
  workflow_call:
    inputs:
      mate:
        description: 'Which mate to run'
        required: true
        type: string
      mates_root:
        description: 'Path to the claude-mates framework (. for self, path for external)'
        required: false
        type: string
        default: '.'
      wizard_skill:
        description: 'GitHub repo containing the wizard skill (owner/repo format, or empty to skip)'
        required: false
        type: string
        default: 'vlad-ko/claude-wizard'
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # Skip mate's own commits (infinite loop prevention)
    if: >-
      !contains(github.event.head_commit.message || '', '[claude-mate') &&
      !contains(github.event.head_commit.message || '', 'claude-mate/')

    # Note: permissions must be declared by the CALLER workflow, not here.
    # Each mate-*.yml must include the permissions block.

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      # Load wizard skill so Claude Code uses architect-level methodology
      # Always grabs latest main — the skill is read-only context, not executed code
      - name: Load wizard skill
        if: inputs.wizard_skill != ''
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.wizard_skill }}
          path: .wizard-skill-tmp
          sparse-checkout: skill

      - name: Install wizard skill
        if: inputs.wizard_skill != ''
        run: |
          mkdir -p .claude/skills/wizard
          cp .wizard-skill-tmp/skill/* .claude/skills/wizard/
          rm -rf .wizard-skill-tmp
          echo "Wizard skill loaded from ${{ inputs.wizard_skill }}"

      # Pin CLI version for supply chain security
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.97

      - name: Run mate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MATE_NAME: ${{ inputs.mate }}
          CONFIG_PATH: .claude-mates.yml
          TRIGGER_CONTEXT: '{"event":"${{ github.event_name }}","sha":"${{ github.sha }}"}'
          MATES_ROOT: ${{ inputs.mates_root }}
        run: bash ${{ inputs.mates_root }}/runner.sh "${{ inputs.mate }}" "${{ inputs.mates_root }}/mates/${{ inputs.mate }}" ".claude-mates.yml"

      - name: Upload run summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mate-${{ inputs.mate }}-${{ github.run_number }}
          path: /tmp/mate-*-summary.json
          retention-days: 30
          if-no-files-found: ignore
