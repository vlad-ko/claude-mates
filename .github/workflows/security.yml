# Security mate dogfood — runs on every PR to claude-mates.
#
# The security mate is a thin wrapper over anthropics/claude-code-security-review.
# Unlike the drift mates (docs, tests, dead-code, logic) which run nightly as a
# state-query over HEAD, security review is a PR-scoped policy gate: the scanner
# analyzes the diff and posts line-accurate review comments on the actual
# vulnerable code BEFORE it lands on main.
#
# Uses `uses: ./` — same code path external adopters run via
# `uses: vlad-ko/claude-mates@vX.Y.Z`. Breaks-for-us = breaks-for-them.

name: Security

on:
  pull_request:
    branches: [main]

concurrency:
  # One security review per PR at a time; new pushes cancel the stale run.
  group: security-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Opt into Node.js 24 for JavaScript actions. The Anthropic security scanner
# and its transitive deps (actions/checkout, actions/cache, setup-node,
# setup-python, upload-artifact) still ship Node 20 at their pinned SHAs.
# GitHub forces Node 24 default on 2026-06-02 and removes Node 20 on
# 2026-09-16 — this env silences the deprecation warning today and
# future-proofs the workflow.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 25  # Allow headroom over the scanner's default 20m.

    permissions:
      pull-requests: write   # For posting line-accurate review comments
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          # Review the actual proposed code, not the merge commit
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2       # Need parent to diff against

      - id: mate
        uses: ./
        with:
          mate: security
          api-key: ${{ secrets.CLAUDE_MATES_API_KEY }}

      - name: Log outcome
        if: always()
        # Pass action outputs via env: rather than direct `${{ }}`
        # interpolation in the run: block. `${{ }}` substitution happens
        # BEFORE bash sees the command, so any shell metacharacters in the
        # value would be executed. Env-var references (`$VAR`) are inert.
        # The security workflow runs on `pull_request` from external
        # contributors, so this surface matters — any future bug in the
        # composite action that leaked PR content into outputs would
        # become exploitable without this fix.
        env:
          OUTCOME: ${{ steps.mate.outputs.outcome }}
          STATUS: ${{ steps.mate.outputs.status }}
          FINDINGS: ${{ steps.mate.outputs.findings-count || 0 }}
        run: |
          echo "Outcome:  $OUTCOME"
          echo "Status:   $STATUS"
          echo "Findings: $FINDINGS"
