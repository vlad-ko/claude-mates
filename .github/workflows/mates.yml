# Dogfood: run the action on claude-mates itself.
#
# Each mate is a separate matrix leg — independent concurrency group, separate
# log stream, one API budget per mate. `fail-fast: false` so one mate's error
# doesn't cancel the others.
#
# Uses `uses: ./` to load the action from the current checkout. This is the
# SAME code path external adopters run via `uses: vlad-ko/claude-mates@vX.Y.Z`.
# Whatever breaks for us breaks for them, and vice versa.

name: Mates

on:
  schedule:
    - cron: '0 6 * * 1-5'  # Weekdays 6am UTC
  workflow_dispatch: {}    # Manual dispatch runs all mates; the self-loop
                           # guard in runner.sh keeps unneeded runs cheap.

# Opt into Node.js 24 for JavaScript actions. GitHub is forcing Node 24
# as default on 2026-06-02 and removing Node 20 from runners on
# 2026-09-16. Several transitive deps used by the action (actions/checkout,
# actions/cache, actions/setup-node, etc.) still ship Node 20 at their
# pinned SHAs — this env silences the deprecation warning today and
# future-proofs the workflow.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  mate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write

    strategy:
      fail-fast: false
      matrix:
        # security is NOT here — it's a PR-scoped policy gate, not a nightly
        # drift scan. See .github/workflows/security.yml for the security
        # mate dogfood (on: pull_request).
        mate: [docs, dead-code, logic, tests]

    concurrency:
      group: mate-${{ matrix.mate }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v5
        with:
          # Deep enough history for runner.sh's self-loop guard to look back
          # past recent mate commits to find the last human commit.
          fetch-depth: 100

      - id: mate
        uses: ./
        with:
          mate: ${{ matrix.mate }}
          api-key: ${{ secrets.CLAUDE_MATES_API_KEY }}

      - name: Log outcome
        if: always()
        # Pass action outputs through env vars rather than interpolating
        # `${{ }}` directly into the run: shell block. `${{ }}` substitution
        # happens BEFORE bash sees the command, so any shell metacharacters
        # in the value would be executed. Env-var references (`$VAR`) are
        # inert — bash treats the value as data, never as code.
        env:
          OUTCOME: ${{ steps.mate.outputs.outcome }}
          STATUS: ${{ steps.mate.outputs.status }}
          ISSUE_URL: ${{ steps.mate.outputs.issue-url }}
          PR_URL: ${{ steps.mate.outputs.pr-url }}
        run: |
          echo "Outcome: $OUTCOME"
          echo "Status:  $STATUS"
          # Guarded with `if` rather than `[ -n "" ] && echo` — the
          # short-circuit form exits non-zero on empty values and would
          # fail the step under bash -e when the mate ran cleanly.
          if [ -n "$ISSUE_URL" ]; then
            echo "Issue: $ISSUE_URL"
          fi
          if [ -n "$PR_URL" ]; then
            echo "PR:    $PR_URL"
          fi

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mate-${{ matrix.mate }}-${{ github.run_number }}
          path: /tmp/mate-*-summary.json
          retention-days: 30
          if-no-files-found: ignore
