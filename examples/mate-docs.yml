# Claude Mate: Docs
# Copy to .github/workflows/mate-docs.yml in your repo
# Requires: .claude-mates.yml config in repo root + CLAUDE_MATES_API_KEY secret

name: "Mate: Docs"

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: mate-docs
  cancel-in-progress: false

jobs:
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    if: >-
      !contains(github.event.head_commit.message || '', '[claude-mate') &&
      !contains(github.event.head_commit.message || '', 'claude-mate/')

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Pin to specific commit SHA — update when upgrading claude-mates
      - uses: actions/checkout@v4
        with:
          repository: vlad-ko/claude-mates
          ref: REPLACE_WITH_LATEST_SHA  # Update this after each claude-mates release
          path: .claude-mates-framework

      - run: npm install -g @anthropic-ai/claude-code@2.1.97

      - name: Run docs mate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_MATES_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MATE_NAME: "docs"
          CONFIG_PATH: .claude-mates.yml
          TRIGGER_CONTEXT: '{"event":"${{ github.event_name }}","sha":"${{ github.sha }}"}'
          MATES_ROOT: .claude-mates-framework
        run: bash .claude-mates-framework/runner.sh "docs" ".claude-mates-framework/mates/docs" ".claude-mates.yml"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mate-docs-${{ github.run_number }}
          path: /tmp/mate-*-summary.json
          retention-days: 30
          if-no-files-found: ignore
