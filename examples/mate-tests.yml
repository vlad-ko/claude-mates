# Claude Mate: Tests
# Copy to .github/workflows/mate-tests.yml in your repo
# Requires: .claude-mates.yml config in repo root + CLAUDE_MATES_API_KEY secret

name: "Mate: Tests"

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1-5'  # Weekdays 6am UTC
  workflow_dispatch: {}

concurrency:
  group: mate-tests
  cancel-in-progress: false

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    if: >-
      !contains(github.event.head_commit.message || '', '[claude-mate') &&
      !contains(github.event.head_commit.message || '', 'claude-mate/')

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      # Pin to specific commit SHA — update when upgrading claude-mates
      - uses: actions/checkout@v5
        with:
          repository: vlad-ko/claude-mates
          ref: v0.1.0  # Pin to a release tag — see https://github.com/vlad-ko/claude-mates/releases
          path: .claude-mates-framework

      - run: npm install -g @anthropic-ai/claude-code@2.1.97

      - name: Run tests mate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_MATES_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MATE_NAME: "tests"
          CONFIG_PATH: .claude-mates.yml
          TRIGGER_CONTEXT: '{"event":"${{ github.event_name }}","sha":"${{ github.sha }}"}'
          MATES_ROOT: .claude-mates-framework
        run: bash .claude-mates-framework/runner.sh "tests" ".claude-mates-framework/mates/tests" ".claude-mates.yml"

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: mate-tests-${{ github.run_number }}
          path: /tmp/mate-*-summary.json
          retention-days: 30
          if-no-files-found: ignore
