# Example GitHub Actions workflow for Claude Mates
# Copy this to .github/workflows/claude-mates.yml in your repo

name: Claude Mates

on:
  # Run after merge to main
  push:
    branches: [main]

  # Nightly sweep (weekdays 6am UTC)
  schedule:
    - cron: '0 6 * * 1-5'

  # Manual dispatch for testing
  workflow_dispatch:
    inputs:
      mate:
        description: 'Which mate to run (docs, security, dead-code, tests, logic, or all)'
        required: false
        default: 'docs'

# Prevent concurrent runs
concurrency:
  group: claude-mates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-mates:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Only run if not a claude-mate PR (prevent infinite loops)
    if: "!contains(github.event.head_commit.message, '[claude-mate')"

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need parent commit for diff

      - name: Checkout claude-mates framework
        uses: actions/checkout@v4
        with:
          repository: vlad-ko/claude-mates  # Change to your fork/org
          path: .claude-mates-framework

      - name: Determine which mate to run
        id: which-mate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mate=${{ inputs.mate }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "mate=all" >> $GITHUB_OUTPUT
          else
            # Post-merge: run post-merge mates only
            echo "mate=docs" >> $GITHUB_OUTPUT
          fi

      - name: Build trigger context
        id: context
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            CONTEXT='{"event":"push","sha":"${{ github.sha }}","ref":"${{ github.ref }}"}'
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            CONTEXT='{"event":"schedule","cron":"nightly"}'
          else
            CONTEXT='{"event":"manual","mate":"${{ inputs.mate }}"}'
          fi
          echo "context=$CONTEXT" >> $GITHUB_OUTPUT

      - name: Run Claude Mates
        uses: ./.claude-mates-framework
        with:
          mate: ${{ steps.which-mate.outputs.mate }}
          anthropic_api_key: ${{ secrets.CLAUDE_MATES_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_context: ${{ steps.context.outputs.context }}

      - name: Upload run summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-mates-run-${{ github.run_number }}
          path: /tmp/mate-*-summary.json
          retention-days: 30
          if-no-files-found: ignore
