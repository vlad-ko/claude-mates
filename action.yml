name: 'Claude Mate'
description: 'Run an autonomous Claude-powered maintenance agent (docs, tests, dead-code, logic, security) on your repo.'
author: 'vlad-ko'
branding:
  icon: 'zap'
  color: 'purple'

inputs:
  mate:
    description: 'Which mate to run. One of: docs, tests, dead-code, logic, security. See the repo README for the full list.'
    required: true
  api-key:
    description: 'Anthropic API key (the CLAUDE_MATES_API_KEY secret). Passed to the Claude Code CLI as ANTHROPIC_API_KEY.'
    required: true
  config-path:
    description: 'Path to .claude-mates.yml inside the consumer workspace. Used for per-mate enable/disable, model overrides, scope, and deny rules.'
    required: false
    default: '.claude-mates.yml'
  claude-cli-version:
    description: 'Version of @anthropic-ai/claude-code to install. Pin explicitly for reproducible runs.'
    required: false
    default: '2.1.97'

outputs:
  outcome:
    description: >-
      What the mate produced on this run. One of:
      none (clean/error/empty/violations-only),
      findings (Claude reported findings but made no file edits — rendered
        to the Job Summary and workflow log, no GitHub issue filed),
      pr (a PR was opened, or attempted — check pr-url for success).
    value: ${{ steps.run.outputs.outcome }}
  status:
    description: 'Classification of Claude''s output. One of: ok | clean | error | empty.'
    value: ${{ steps.run.outputs.status }}
  issue-url:
    description: >-
      URL of a GitHub issue linked to this run. Reserved for forward compat;
      currently always empty since v0.3.x — the mate no longer auto-files
      issues (findings go to the Job Summary instead). A human-filed issue
      matching the mate label is auto-linked in the PR via Fixes #N but is
      not echoed here.
    value: ${{ steps.run.outputs.issue-url }}
  pr-url:
    description: 'URL of the GitHub PR created by this run (empty if no PR).'
    value: ${{ steps.run.outputs.pr-url }}

runs:
  using: 'composite'
  steps:
    - name: Install Claude Code CLI
      shell: bash
      run: npm install -g "@anthropic-ai/claude-code@${{ inputs.claude-cli-version }}"

    - name: Run mate
      id: run
      shell: bash
      env:
        # The Claude CLI reads this; it must be the Anthropic API key (not a GitHub token).
        ANTHROPIC_API_KEY: ${{ inputs.api-key }}
        # Used by runner.sh for gh CLI calls that create issues/PRs in the consumer repo.
        GITHUB_TOKEN: ${{ github.token }}
        # Which mate to run, and where its prompt/config live inside the action checkout.
        MATE_NAME: ${{ inputs.mate }}
        CONFIG_PATH: ${{ inputs.config-path }}
        # Framework root — points at the action's own checkout inside _actions/, which is
        # outside the consumer workspace. This is what makes the "phantom framework files"
        # bug class structurally impossible in this model.
        MATES_ROOT: ${{ github.action_path }}
        # Minimal trigger context for the mate prompt to reference.
        TRIGGER_CONTEXT: '{"event":"${{ github.event_name }}","sha":"${{ github.sha }}"}'
      run: |
        bash "${{ github.action_path }}/runner.sh" \
          "${{ inputs.mate }}" \
          "${{ github.action_path }}/mates/${{ inputs.mate }}" \
          "${{ inputs.config-path }}"
